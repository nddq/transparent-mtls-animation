<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>How Transparent mTLS Works — Cilium + ztunnel + SPIRE</title>
  <style>
    :root {
      --bg: #0B1622;
      --card: #111E2E;
      --text: #B8C4D0;
      --bright: #E2EAF4;
      --dim: #3A4A5C;
      --border: #1E3048;
      --muted: #7A8FA3;
      --btn-bg: #152030;
      --btn-border: #1E3048;
      --btn-hover: #1E3048;
    }

    :root.light {
      --bg: #F8FAFC;
      --card: #FFFFFF;
      --text: #1A2332;
      --bright: #0F1B2D;
      --dim: #94A3B8;
      --border: #C8D6E5;
      --muted: #64748B;
      --btn-bg: #F0F4F8;
      --btn-border: #C8D6E5;
      --btn-hover: #D8E2EC;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 10px 16px 16px;
      transition: background 0.3s, color 0.3s;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--bright);
      margin-bottom: 2px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .canvas-wrap {
      position: relative;
      width: 1400px;
      max-width: 100%;
    }

    canvas {
      display: block;
      width: 100%;
      max-width: 1400px;
      height: auto;
      border-radius: 8px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .controls button {
      background: var(--btn-bg);
      color: var(--text);
      border: 1px solid var(--btn-border);
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      font-family: inherit;
      white-space: nowrap;
    }

    .controls button:hover {
      background: var(--btn-hover);
      border-color: var(--dim);
    }

    .controls button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .controls button.active {
      background: #326CE5;
      border-color: #4A8AF4;
      color: #fff;
    }

    .controls button.nav-btn {
      padding: 8px 24px;
      font-size: 15px;
      font-weight: 600;
    }

    .step-counter {
      font-size: 14px;
      color: var(--muted);
      min-width: 90px;
      text-align: center;
      font-weight: 600;
    }

    .speed-group {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-left: 6px;
    }

    .speed-group label {
      font-size: 12px;
      color: var(--muted);
      margin-right: 2px;
    }

    .speed-group button {
      padding: 5px 10px;
      font-size: 12px;
      min-width: 36px;
    }

    .legend {
      display: flex;
      gap: 18px;
      margin-top: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    .theme-toggle {
      position: absolute;
      top: 10px;
      right: 16px;
      background: var(--btn-bg);
      color: var(--text);
      border: 1px solid var(--btn-border);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    .theme-toggle:hover {
      background: var(--btn-hover);
    }

    .legend-swatch {
      width: 16px;
      height: 4px;
      border-radius: 2px;
    }

  </style>
</head>

<body>

  <button class="theme-toggle" id="themeToggle">☀️ Light</button>
  <h1>How Transparent mTLS Works</h1>
  <p class="subtitle">Cilium + ztunnel + SPIRE &mdash; step-by-step walkthrough</p>

  <div class="canvas-wrap">
    <canvas id="c"></canvas>
  </div>

  <div class="controls">
    <button id="btnBack" class="nav-btn" title="Left Arrow">&#9664; Back</button>
    <span class="step-counter" id="stepCounter">Step 1 / 25</span>
    <button id="btnForward" class="nav-btn" title="Right Arrow">Forward &#9654;</button>
    <button id="btnReset" title="Reset">&#10226; Reset</button>
    <button id="btnAuto" title="Space">&#9654; Auto-play</button>
    <button id="btnOverview" title="Show all flows">&#9673; Overview</button>
    <button id="btnGif" title="Export GIF">&#128247; Export GIF</button>
    <div class="speed-group">
      <label>Speed:</label>
      <button class="speed-btn active" data-speed="1">1x</button>
      <button class="speed-btn" data-speed="2">2x</button>
      <button class="speed-btn" data-speed="3">3x</button>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-swatch" style="background:#326CE5"></div>Plaintext traffic
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:#00C9A7"></div>Encrypted / mTLS
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:#E5A00D"></div>SPIRE certificate flow
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:#F5C542"></div>TLS handshake
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:#9B6DFF"></div>Cilium control plane
    </div>
  </div>

  <script>
    "use strict";

    /* ================================================================
       Canvas setup
       ================================================================ */
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const CW = 1400, CH = 880;

    function resize() {
      const dpr = Math.max(2, window.devicePixelRatio || 1);
      canvas.width = Math.round(CW * dpr);
      canvas.height = Math.round(CH * dpr);
      canvas.style.aspectRatio = CW + ' / ' + CH;
      /* Fallback for browsers without aspect-ratio support */
      if (typeof CSS === 'undefined' || !CSS.supports || !CSS.supports('aspect-ratio', '1 / 1')) {
        canvas.style.height = (canvas.clientWidth * CH / CW) + 'px';
      }
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.imageSmoothingEnabled = true;
      if (ctx.imageSmoothingQuality !== undefined) ctx.imageSmoothingQuality = 'high';
    }
    resize();
    window.addEventListener('resize', resize);

    /* ================================================================
       Color palette
       ================================================================ */
    const THEMES = {
      dark: {
        bg: '#0B1622', border: '#1E3048', text: '#B8C4D0', bright: '#E2EAF4', dim: '#3A4A5C',
        blue: '#326CE5', green: '#00C9A7', orange: '#E5A00D', gold: '#F5C542',
        purple: '#9B6DFF', red: '#F85149',
        nsGreen: '#0B2028', nsBorderGreen: '#00A383',
        dpFill: '#0E1A32', dpBorder: '#326CE5',
        cpFill: '#141A24', cpBorder: '#4A6A8A',
        compBg: '#111E2E', compBorder: '#1E3048',
        dimAlpha: 0.3,
      },
      light: {
        bg: '#F8FAFC', border: '#C8D6E5', text: '#1A2332', bright: '#0F1B2D', dim: '#94A3B8',
        blue: '#2557B8', green: '#008F7A', orange: '#B8860B', gold: '#C99A2E',
        purple: '#7C4DFF', red: '#CF222E',
        nsGreen: '#D6F5ED', nsBorderGreen: '#008F7A',
        dpFill: '#E8F0FE', dpBorder: '#2557B8',
        cpFill: '#EFF2F7', cpBorder: '#5A7DA0',
        compBg: '#FFFFFF', compBorder: '#C8D6E5',
        dimAlpha: 0.25,
      },
    };
    let isDark = true;
    let C = { ...THEMES.dark };

    function applyTheme(dark) {
      isDark = dark;
      Object.assign(C, dark ? THEMES.dark : THEMES.light);
      document.documentElement.classList.toggle('light', !dark);
      const btn = document.getElementById('themeToggle');
      btn.textContent = dark ? '☀️ Light' : '🌙 Dark';
      /* Update legend swatches to match theme */
      const swatches = document.querySelectorAll('.legend-swatch');
      const legendColors = [C.blue, C.green, C.orange, C.gold, C.purple];
      swatches.forEach((sw, i) => { if (legendColors[i]) sw.style.background = legendColors[i]; });
    }
    document.getElementById('themeToggle').addEventListener('click', () => applyTheme(!isDark));

    /* ================================================================
       Logo loading (SVG/PNG icons with emoji fallback)
       ================================================================ */
    const LOGO_REGISTRY = {
      pod: {
        url: 'https://raw.githubusercontent.com/kubernetes/community/master/icons/svg/resources/unlabeled/pod.svg',
        fallback: '\uD83D\uDCE6', img: null, loaded: false,
      },
      istio: {
        url: 'https://raw.githubusercontent.com/cncf/artwork/main/projects/istio/icon/color/istio-icon-color.svg',
        fallback: '\uD83D\uDD12', img: null, loaded: false,
      },
      cilium: {
        url: 'https://raw.githubusercontent.com/cncf/artwork/main/projects/cilium/icon/color/cilium_icon-color.svg',
        fallback: '\uD83D\uDC1D', img: null, loaded: false,
      },
      spiffe: {
        url: 'https://raw.githubusercontent.com/cncf/artwork/main/projects/spiffe/icon/color/spiffe-icon-color.svg',
        fallback: '\uD83D\uDD10', img: null, loaded: false,
      },
      containerd: {
        url: 'https://raw.githubusercontent.com/cncf/artwork/main/projects/containerd/icon/color/containerd-icon-color.svg',
        fallback: '\uD83D\uDC33', img: null, loaded: false,
      },
      endpoint: {
        url: 'https://raw.githubusercontent.com/kubernetes/community/master/icons/svg/resources/unlabeled/ep.svg',
        fallback: '\uD83D\uDD17', img: null, loaded: false,
      },
      node: {
        url: 'https://raw.githubusercontent.com/kubernetes/community/master/icons/svg/infrastructure_components/unlabeled/node.svg',
        fallback: '\uD83D\uDD0C', img: null, loaded: false,
      },
    };

    function loadLogos() {
      const entries = Object.values(LOGO_REGISTRY);
      return Promise.all(entries.map(entry => {
        return new Promise(resolve => {
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = () => { entry.img = img; entry.loaded = true; resolve(); };
          img.onerror = () => { entry.loaded = false; resolve(); };
          img.src = entry.url;
        });
      }));
    }

    /* ================================================================
       IPs
       ================================================================ */
    const IPs = {
      nodeA: '10.224.0.4',
      nodeB: '10.224.0.5',
      clientPod: '10.240.1.52',
      serverPod: '10.240.0.132',
      ztunnelA: '10.240.1.239',
      ztunnelB: '10.240.0.216',
    };

    /* ================================================================
       Layout constants
       ================================================================ */
    const NODE_W = 620, NODE_H = 704;
    const GAP = 80;
    const NODE_AX = Math.round((CW - 2 * NODE_W - GAP) / 2);
    const NODE_BX = NODE_AX + NODE_W + GAP;
    const NODE_Y = 32;
    const NODE_HEADER = 34;
    const COMP_W = 200, COMP_H = 55;
    const CP_COMP_W = 170, CP_COMP_H = 48;

    /* Component layout builder */
    function nodeLayout(nx, isLeft) {
      const nsY = NODE_Y + NODE_HEADER + 30;
      const nsPadV = 18;
      const nsH = COMP_H + 2 * nsPadV + 8;

      /* lxc veth sits just below namespace zone — host-side of pod's veth pair */
      const lxcY = nsY + nsH + 4;

      const dpY = lxcY + CP_COMP_H + 6;
      const dpPadV = 18;
      const dpH = COMP_H + 2 * dpPadV + 8;

      /* Control plane: 2x3 grid of smaller components */
      const cpY = dpY + dpH + 10;
      const cpColGap = 24;
      const cpRowGap = 16;
      const cpGridH = 3 * CP_COMP_H + 2 * cpRowGap;
      const cpPadTop = 28;
      const cpPadBot = 14;
      const cpH = cpPadTop + cpGridH + cpPadBot;

      /* Centering helpers */
      const centerX = nx + NODE_W / 2;
      const podX = centerX - COMP_W / 2;
      const podY = nsY + nsPadV + 4;
      const ztX = centerX - COMP_W / 2;
      const ztY = dpY + dpPadV + 4;

      /* Control plane: 2x3 grid */
      const gridW = CP_COMP_W * 2 + cpColGap;
      const gx = nx + (NODE_W - gridW) / 2;
      const gy = cpY + cpPadTop;

      return {
        nx, nsY, nsH, dpY, dpH, cpY, cpH,
        pod: { x: podX, y: podY, w: COMP_W, h: COMP_H },
        zt: { x: ztX, y: ztY, w: COMP_W, h: COMP_H },
        ciliumAgent: { x: gx, y: gy, w: CP_COMP_W, h: CP_COMP_H },
        ciliumOp: { x: gx + CP_COMP_W + cpColGap, y: gy, w: CP_COMP_W, h: CP_COMP_H },
        spireAgent: { x: gx, y: gy + CP_COMP_H + cpRowGap, w: CP_COMP_W, h: CP_COMP_H },
        spireServer: { x: gx + CP_COMP_W + cpColGap, y: gy + CP_COMP_H + cpRowGap, w: CP_COMP_W, h: CP_COMP_H },
        containerd: { x: gx, y: gy + 2 * (CP_COMP_H + cpRowGap), w: CP_COMP_W, h: CP_COMP_H },
        /* lxc veth: host-side veth pair, attached below pod's namespace zone */
        lxc: { x: centerX - CP_COMP_W / 2, y: lxcY, w: CP_COMP_W, h: CP_COMP_H },
        /* Unenrolled namespace zone (Node B only) */
        unenrolledY: cpY + cpH + 10,
        unenrolledH: COMP_H + 2 * 12 + 8,
        monitoringPod: { x: centerX - COMP_W / 2, y: cpY + cpH + 10 + 12 + 4, w: COMP_W, h: COMP_H },
        /* NIC at bottom-inner edge of node box (facing the gap between nodes) */
        nic: { x: isLeft ? nx + NODE_W - CP_COMP_W - 12 : nx + 12, y: NODE_Y + NODE_H - CP_COMP_H - 8, w: CP_COMP_W, h: CP_COMP_H },
      };
    }

    const LA = nodeLayout(NODE_AX, true);
    const LB = nodeLayout(NODE_BX, false);

    /* ================================================================
       Component registry
       ================================================================ */
    const COMP = {
      podA: { r: LA.pod, label: 'Client Pod', icon: '\uD83D\uDCE6', iconType: 'pod', ip: IPs.clientPod, sub: 'ns: frontend / sa: web-client' },
      podB: { r: LB.pod, label: 'Server Pod', icon: '\uD83D\uDCE6', iconType: 'pod', ip: IPs.serverPod, sub: 'ns: backend / sa: api-server' },
      ztA: { r: LA.zt, label: 'ztunnel', icon: '\uD83D\uDD12', iconType: 'istio', ip: IPs.ztunnelA },
      ztB: { r: LB.zt, label: 'ztunnel', icon: '\uD83D\uDD12', iconType: 'istio', ip: IPs.ztunnelB },
      ciliumAgentA: { r: LA.ciliumAgent, label: 'Cilium Agent', icon: '\uD83D\uDC1D', iconType: 'cilium', ip: '' },
      ciliumAgentB: { r: LB.ciliumAgent, label: 'Cilium Agent', icon: '\uD83D\uDC1D', iconType: 'cilium', ip: '' },
      ciliumOpA: { r: LA.ciliumOp, label: 'Cilium Operator', icon: '\u2699\uFE0F', iconType: 'cilium', ip: '' },
      spireAgentA: { r: LA.spireAgent, label: 'SPIRE Agent', icon: '\uD83D\uDD10', iconType: 'spiffe', ip: '' },
      spireAgentB: { r: LB.spireAgent, label: 'SPIRE Agent', icon: '\uD83D\uDD10', iconType: 'spiffe', ip: '' },
      spireServerA: { r: LA.spireServer, label: 'SPIRE Server', icon: '\uD83C\uDFDB\uFE0F', iconType: 'spiffe', ip: '' },
      containerdA: { r: LA.containerd, label: 'containerd', icon: '\uD83D\uDC33', iconType: 'containerd', ip: '' },
      containerdB: { r: LB.containerd, label: 'containerd', icon: '\uD83D\uDC33', iconType: 'containerd', ip: '' },
      lxcA: { r: LA.lxc, label: 'lxc veth (host)', icon: '\uD83D\uDD17', iconType: 'endpoint', ip: '' },
      lxcB: { r: LB.lxc, label: 'lxc veth (host)', icon: '\uD83D\uDD17', iconType: 'endpoint', ip: '' },
      nicA: { r: LA.nic, label: 'eth0 (NIC)', icon: '\uD83D\uDD0C', iconType: 'node', ip: IPs.nodeA },
      nicB: { r: LB.nic, label: 'eth0 (NIC)', icon: '\uD83D\uDD0C', iconType: 'node', ip: IPs.nodeB },
      monitoringPod: { r: LB.monitoringPod, label: 'Monitoring Pod', icon: '\uD83D\uDCE6', iconType: 'pod', ip: '10.240.0.88', sub: 'ns: monitoring (not enrolled)' },
    };

    function getRect(id) { return COMP[id] ? COMP[id].r : null; }

    /* Namespace zone rects */
    const nsRectA = { x: NODE_AX + 10, y: LA.nsY, w: NODE_W - 20, h: LA.nsH };
    const nsRectB = { x: NODE_BX + 10, y: LB.nsY, w: NODE_W - 20, h: LB.nsH };
    /* ================================================================
       25-step narrative
       ================================================================ */
    const STEPS = [
      /* --- Enrollment 1-3 --- */
      {
        n: 1,
        title: 'User enrolls namespace',
        desc: 'kubectl label ns frontend io.cilium/mtls-enabled="true" && kubectl label ns backend io.cilium/mtls-enabled="true" — both namespace zones activate, enabling transparent mTLS for all workloads.',
        phase: 'enrollment',
        active: ['podA', 'podB'],
        arrows: [],
        fx: ['nsEnroll'],
        links: [
          { repo: 'cilium/cilium', label: 'K8sNamespaceToEnrolledNamespace()', url: 'https://github.com/cilium/cilium/blob/main/pkg/ztunnel/table/enrolled_namespaces.go' },
          { repo: 'cilium/cilium', label: 'EnrollmentReconciler.Update()', url: 'https://github.com/cilium/cilium/blob/main/pkg/ztunnel/reconciler/reconciler.go' },
        ],
      },
      {
        n: 2,
        title: 'Cilium Operator registers SPIFFE entries',
        desc: 'Cilium Operator (admin access) registers SPIFFE entries per service account in SPIRE Server: spiffe://cluster.local/ns/frontend/sa/web-client and spiffe://cluster.local/ns/backend/sa/api-server.',
        phase: 'enrollment',
        active: ['ciliumOpA', 'spireServerA'],
        arrows: [{ from: 'ciliumOpA', to: 'spireServerA', color: 'orange', label: 'Register SPIFFE entries (2 SAs)' }],
        fx: [],
        links: [
          { repo: 'cilium/cilium', label: 'SPIRE Client.Upsert()', url: 'https://github.com/cilium/cilium/blob/main/operator/auth/spire/client.go' },
          { repo: 'cilium/cilium', label: 'IdentityWatcher.run()', url: 'https://github.com/cilium/cilium/blob/main/operator/auth/watcher.go' },
          { repo: 'spiffe/spire', label: 'Entry API: BatchCreateEntry()', url: 'https://github.com/spiffe/spire/blob/main/pkg/server/api/entry/v1/service.go' },
        ],
      },
      {
        n: 3,
        title: 'Cilium Agent installs iptables rules in pod netns (both nodes)',
        desc: 'On BOTH nodes concurrently: Cilium Agent enters each enrolled pod\'s network namespace and installs iptables REDIRECT rules (OUTPUT: ! --mark 0x539/0xfff → :15001, PREROUTING: → :15006/:15008). This is done via ZDS EnrollEndpoint() → CreateInPodRules().',
        phase: 'enrollment',
        active: ['ciliumAgentA', 'ciliumAgentB', 'podA', 'podB'],
        arrows: [
          { from: 'ciliumAgentA', to: 'podA', color: 'purple', label: 'Enter netns → install iptables' },
          { from: 'ciliumAgentB', to: 'podB', color: 'purple', label: 'Enter netns → install iptables' },
        ],
        fx: [],
        links: [
          { repo: 'cilium/cilium', label: 'CreateInPodRules()', url: 'https://github.com/cilium/cilium/blob/main/pkg/ztunnel/iptables/inpod.go' },
          { repo: 'cilium/cilium', label: 'ZDS Server.EnrollEndpoint()', url: 'https://github.com/cilium/cilium/blob/main/pkg/ztunnel/zds/server.go' },
        ],
      },
      {
        n: 4,
        title: 'ztunnel enters pod netns, opens listeners (both nodes)',
        desc: 'On BOTH nodes: Cilium Agent notifies ztunnel via ZDS. ztunnel enters each pod\'s netns via setns(CLONE_NEWNET) and opens listening sockets — :15001 (outbound capture), :15006 (inbound plaintext), :15008 (HBONE inbound). Cilium Agent also pushes xDS workload metadata for all enrolled workloads in the cluster to ztunnel via unix:///var/run/cilium/xds.sock.',
        phase: 'enrollment',
        active: ['ztA', 'ztB', 'ciliumAgentA', 'ciliumAgentB', 'podA', 'podB'],
        arrows: [
          { from: 'ciliumAgentA', to: 'ztA', color: 'purple', label: 'ZDS: enroll pod', offX: -35, labelOffY: -10 },
          { from: 'ciliumAgentB', to: 'ztB', color: 'purple', label: 'ZDS: enroll pod', offX: -35, labelOffY: -10 },
          { from: 'ztA', to: 'podA', color: 'green', label: 'setns() → bind :15001/:15006/:15008' },
          { from: 'ztB', to: 'podB', color: 'green', label: 'setns() → bind :15001/:15006/:15008' },
          { from: 'ciliumAgentA', to: 'ztA', color: 'purple', label: 'xDS: workload metadata', offX: 35, labelOffY: 10 },
          { from: 'ciliumAgentB', to: 'ztB', color: 'purple', label: 'xDS: workload metadata', offX: 35, labelOffY: 10 },
        ],
        fx: [],
        links: [
          { repo: 'cilium/ztunnel', label: 'ZDS WorkloadStreamProcessor', url: 'https://github.com/cilium/ztunnel/blob/main/src/inpod/protocol.rs' },
          { repo: 'cilium/ztunnel', label: 'WorkloadProxyManager.run()', url: 'https://github.com/cilium/ztunnel/blob/main/src/inpod/workloadmanager.rs' },
          { repo: 'cilium/ztunnel', label: 'InpodNetns::run() [setns]', url: 'https://github.com/cilium/ztunnel/blob/main/src/inpod/netns.rs' },
          { repo: 'cilium/ztunnel', label: 'Outbound::new() [:15001]', url: 'https://github.com/cilium/ztunnel/blob/main/src/proxy/outbound.rs' },
          { repo: 'cilium/ztunnel', label: 'InboundPassthrough::new() [:15006]', url: 'https://github.com/cilium/ztunnel/blob/main/src/proxy/inbound_passthrough.rs' },
          { repo: 'cilium/ztunnel', label: 'Inbound::new() [:15008]', url: 'https://github.com/cilium/ztunnel/blob/main/src/proxy/inbound.rs' },
          { repo: 'cilium/cilium', label: 'xDS Server for ztunnel', url: 'https://github.com/cilium/cilium/blob/main/pkg/ztunnel/xds/xds_server.go' },
        ],
      },

      /* --- First packet + on-demand cert fetch --- */
      {
        n: 5,
        title: 'Client Pod sends HTTP request (plaintext)',
        desc: 'Client Pod (' + IPs.clientPod + ') sends HTTP request. Plaintext packet hits iptables OUTPUT chain in pod\'s netns.',

    /* ================================================================
       State
       ================================================================ */
    let step = 0;
    let autoPlay = false;
    let overviewMode = false;
    let autoTimer = null;
    let speed = 1;

    /* ================================================================
       Drawing primitives
       ================================================================ */
    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y, x + w, y + r, r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x, y + h, x, y + h - r, r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x, y, x + r, y, r);
      ctx.closePath();
    }

    function fillRoundRect(x, y, w, h, r, fill) {
      roundRect(x, y, w, h, r);
      ctx.fillStyle = fill;
      ctx.fill();
    }

    /* Draw a zone (namespace / data plane / control plane) */
    function drawZone(x, y, w, h, fill, stroke, label, opts) {
      opts = opts || {};
      ctx.save();
      if (opts.dim) ctx.globalAlpha = C.dimAlpha;
      if (opts.glow) {
        ctx.shadowColor = stroke;
        ctx.shadowBlur = 14;
      }
      roundRect(x, y, w, h, 8);
      ctx.fillStyle = fill;
      ctx.fill();
      ctx.strokeStyle = stroke;
      ctx.lineWidth = opts.glow ? 2 : 1;
      if (opts.dashed) ctx.setLineDash([5, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.shadowBlur = 0;

      /* Label */
      ctx.fillStyle = opts.dim ? C.dim : C.text;
      ctx.font = '11px "Segoe UI", system-ui, sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(label, x + 10, y + 6);
      ctx.restore();
    }

    /* Draw a component box */
    function drawComp(id, opts) {
      opts = opts || {};
      const c = COMP[id];
      if (!c) return;
      const r = c.r;
      const dim = opts.dim || false;
      const glow = opts.glow || false;
      const badge = opts.badge || null;
      const borderColor = opts.borderColor || C.border;

      ctx.save();
      if (dim) ctx.globalAlpha = C.dimAlpha;

      /* Glow */
      if (glow && !dim) {
        ctx.shadowColor = borderColor;
        ctx.shadowBlur = 14;
      }

      /* Box */
      roundRect(r.x, r.y, r.w, r.h, 7);
      ctx.fillStyle = C.compBg || C.bg;
      ctx.fill();
      ctx.strokeStyle = borderColor;
      ctx.lineWidth = glow ? 2.5 : 1;
      ctx.stroke();
      ctx.shadowBlur = 0;

      /* Icon on the left (SVG logo with emoji fallback) */
      const cy = r.y + r.h / 2;
      const ICON_SIZE = 22;
      const iconX = r.x + 8;
      const iconY = cy - ICON_SIZE / 2;
      let drewLogo = false;
      if (c.iconType) {
        const logo = LOGO_REGISTRY[c.iconType];
        if (logo && logo.loaded && logo.img) {
          /* Subtle background circle for contrast in dark mode */
          if (isDark) {
            ctx.beginPath();
            ctx.arc(iconX + ICON_SIZE / 2, cy, ICON_SIZE / 2 + 2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            ctx.fill();
          }
          ctx.drawImage(logo.img, iconX, iconY, ICON_SIZE, ICON_SIZE);
          drewLogo = true;
        }
      }
      if (!drewLogo) {
        ctx.font = '18px "Segoe UI Emoji", "Apple Color Emoji", sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(c.icon, r.x + 10, cy);
      }

      /* Label */
      const hasSub = c.sub && c.ip;
      const labelOffY = hasSub ? -12 : (c.ip ? -7 : 0);
      ctx.fillStyle = dim ? C.dim : C.bright;
      ctx.font = 'bold 14px "Segoe UI", system-ui, sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(c.label, r.x + 36, cy + labelOffY);

      /* IP address */
      if (c.ip) {
        ctx.font = '11px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = dim ? C.dim : C.text;
        ctx.fillText(c.ip, r.x + 36, cy + (hasSub ? 3 : 10));
      }

      /* Sub-label (namespace / service account) */
      if (c.sub) {
        ctx.font = '10px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = dim ? C.dim : C.text;
        ctx.globalAlpha = dim ? C.dimAlpha : 0.6;
        ctx.fillText(c.sub, r.x + 36, cy + 16);
      }

      /* Badge (checkmark, etc) */
      if (badge) {
        ctx.font = 'bold 15px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = badge.color || C.green;
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        ctx.fillText(badge.text, r.x + r.w - 8, cy);
      }

      ctx.restore();
    }

    /* Draw animated arrow between two components */
    /* Find the point where a ray from center of a rect toward (dx,dy) exits the rect, with pad. */
    function rectEdgePoint(rect, dx, dy, pad) {
      const cx = rect.x + rect.w / 2;
      const cy = rect.y + rect.h / 2;
      const hw = rect.w / 2 + pad;
      const hh = rect.h / 2 + pad;
      const adx = Math.abs(dx);
      const ady = Math.abs(dy);
      /* Scale factor to hit the edge */
      let scale;
      if (adx * hh > ady * hw) {
        /* Hits left or right edge */
        scale = hw / (adx || 1);
      } else {
        /* Hits top or bottom edge */
        scale = hh / (ady || 1);
      }
      return { x: cx + dx * scale, y: cy + dy * scale };
    }

    function drawArrow(fromId, toId, color, label, opts, ts) {
      opts = opts || {};
      const fr = getRect(fromId);
      const tr = getRect(toId);
      if (!fr || !tr) return;

      const offY = opts.offY || 0;
      const offX = opts.offX || 0;
      /* Build offset rects so offX/offY shift the virtual center */
      const frOff = { x: fr.x + offX, y: fr.y + offY, w: fr.w, h: fr.h };
      const trOff = { x: tr.x + offX, y: tr.y + offY, w: tr.w, h: tr.h };

      /* Direction vector from source center to target center */
      const ddx = (trOff.x + trOff.w / 2) - (frOff.x + frOff.w / 2);
      const ddy = (trOff.y + trOff.h / 2) - (frOff.y + frOff.h / 2);

      /* Shorten start/end to box edges using ray-rect intersection */
      const angle = Math.atan2(ddy, ddx);
      const spt = rectEdgePoint(frOff, ddx, ddy, 4);
      const ept = rectEdgePoint(trOff, -ddx, -ddy, 4);
      const sx = spt.x;
      const sy = spt.y;
      const ex = ept.x;
      const ey = ept.y;

      /* Travelling dot */
      const t = ((ts || performance.now()) % 2000) / 2000;

      ctx.save();
      /* Line */
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.65;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(ex, ey);
      ctx.stroke();
      ctx.setLineDash([]);

      /* Arrowhead */
      ctx.globalAlpha = 0.85;
      ctx.beginPath();
      ctx.moveTo(ex, ey);
      ctx.lineTo(ex - 10 * Math.cos(angle - 0.35), ey - 10 * Math.sin(angle - 0.35));
      ctx.lineTo(ex - 10 * Math.cos(angle + 0.35), ey - 10 * Math.sin(angle + 0.35));
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();

      /* Travelling dot */
      const dx = sx + (ex - sx) * t;
      const dy = sy + (ey - sy) * t;
      ctx.globalAlpha = 1;
      ctx.beginPath();
      ctx.arc(dx, dy, 5, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.shadowBlur = 0;

      /* Label */
      if (label) {
        const mx = (sx + ex) / 2;
        const my = (sy + ey) / 2 - 12 + (opts.labelOffY || 0);
        ctx.globalAlpha = 0.92;
        ctx.font = '11px "Segoe UI", system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        const tw = ctx.measureText(label).width + 12;
        fillRoundRect(mx - tw / 2, my - 14, tw, 16, 3, isDark ? 'rgba(11,22,34,0.92)' : 'rgba(255,255,255,0.92)');
        ctx.fillStyle = color;
        ctx.fillText(label, mx, my);
      }

      ctx.restore();
    }

    /* Glowing dot */
    function drawDot(x, y, color, radius) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y, radius || 7, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = 12;
      ctx.fill();
      ctx.restore();
    }

    /* ================================================================
       HBONE tunnel line between ztunnels (cross-node)
       ================================================================ */
    function drawHBONELine(ts, fxOverride) {
      const fxSet = fxOverride || new Set(STEPS[step].fx);
      const tunnelActive = fxSet.has('hboneTunnel') || fxSet.has('encryptedEgress') ||
        fxSet.has('crossWire') || fxSet.has('encryptedIngress') ||
        fxSet.has('decryptVerify') || fxSet.has('deliverToServer');

      const fromX = LA.pod.x + LA.pod.w + 2;
      const toX = LB.pod.x - 2;
      const y = LA.pod.y + LA.pod.h / 2;
      const pipeHalf = 10; /* Half-height of the pipe (total ~20px) */
      const mx = (fromX + toX) / 2;

      ctx.save();

      if (tunnelActive) {
        /* Filled green pipe */
        ctx.globalAlpha = 0.18;
        ctx.fillStyle = C.green;
        ctx.beginPath();
        ctx.moveTo(fromX, y - pipeHalf);
        ctx.lineTo(toX, y - pipeHalf);
        ctx.lineTo(toX, y + pipeHalf);
        ctx.lineTo(fromX, y + pipeHalf);
        ctx.closePath();
        ctx.fill();

        /* Pipe border - top line */
        ctx.globalAlpha = 0.9;
        ctx.strokeStyle = C.green;
        ctx.lineWidth = 2;
        ctx.shadowColor = C.green;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.moveTo(fromX, y - pipeHalf);
        ctx.lineTo(toX, y - pipeHalf);
        ctx.stroke();

        /* Pipe border - bottom line */
        ctx.beginPath();
        ctx.moveTo(fromX, y + pipeHalf);
        ctx.lineTo(toX, y + pipeHalf);
        ctx.stroke();
        ctx.shadowBlur = 0;

        /* Travelling dot inside the pipe (steps 16-20) */
        const hasData = fxSet.has('encryptedEgress') || fxSet.has('crossWire') ||
          fxSet.has('encryptedIngress') || fxSet.has('decryptVerify') || fxSet.has('deliverToServer');
        if (hasData) {
          const t = (ts % 2000) / 2000;
          const dx = fromX + (toX - fromX) * t;
          ctx.globalAlpha = 1;
          drawDot(dx, y, C.green, 5);
        }

        /* Lock emoji in center */
        ctx.globalAlpha = 1;
        ctx.font = '14px "Segoe UI", system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('\uD83D\uDD12', mx, y);

        /* Label above the pipe */
        ctx.font = 'bold 11px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = C.green;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('HBONE (HTTP/2 + TLS 1.3)', mx, y - pipeHalf - 6);
      } else {
        /* Inactive: dashed pipe outline */
        ctx.globalAlpha = 0.25;
        ctx.strokeStyle = C.border;
        ctx.lineWidth = 1;
        ctx.setLineDash([6, 6]);

        ctx.beginPath();
        ctx.moveTo(fromX, y - pipeHalf);
        ctx.lineTo(toX, y - pipeHalf);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(fromX, y + pipeHalf);
        ctx.lineTo(toX, y + pipeHalf);
        ctx.stroke();

        ctx.setLineDash([]);

        /* Label */
        ctx.globalAlpha = 0.45;
        ctx.font = '11px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = C.dim;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('HBONE tunnel', mx, y - pipeHalf - 4);
      }
      ctx.restore();
    }

    /* ================================================================
       Wire line between NICs (cross-node)
       ================================================================ */
    function drawWireLine(ts, fxOverride) {
      const fxSet = fxOverride || new Set(STEPS[step].fx);
      const active = fxSet.has('crossWire');

      const fromX = LA.nic.x + LA.nic.w + 2;
      const toX = LB.nic.x - 2;
      const y = LA.nic.y + LA.nic.h / 2;

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(fromX, y);
      ctx.lineTo(toX, y);

      if (active) {
        ctx.strokeStyle = C.green;
        ctx.lineWidth = 2.5;
        ctx.shadowColor = C.green;
        ctx.shadowBlur = 8;
      } else {
        ctx.strokeStyle = C.border;
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.globalAlpha = 0.3;
      }
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.shadowBlur = 0;

      const mx = (fromX + toX) / 2;
      if (active) {
        ctx.globalAlpha = 1;
        ctx.font = '10px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = C.green;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('Encrypted on wire', mx, y - 6);

        /* Travelling dot */
        const t = (ts % 1600) / 1600;
        const dx = fromX + (toX - fromX) * t;
        drawDot(dx, y, C.green, 5);
      } else {
        ctx.globalAlpha = 0.3;
        ctx.font = '10px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = C.dim;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('Wire (encrypted)', mx, y - 4);
      }
      ctx.restore();
    }

    /* ================================================================
       Step indicator dots at the top
       ================================================================ */
    function drawStepDots() {
      const dotR = 4.5;
      const gap = 22;
      const totalW = (STEPS.length - 1) * gap;
      const startX = CW / 2 - totalW / 2;
      const y = NODE_Y + 16;

      const phaseColors = { enrollment: C.nsBorderGreen, cert: C.orange, data: C.blue };

      for (let i = 0; i < STEPS.length; i++) {
        const x = startX + i * gap;
        const pc = phaseColors[STEPS[i].phase];
        ctx.beginPath();
        ctx.arc(x, y, dotR, 0, Math.PI * 2);

        if (i === step) {
          ctx.fillStyle = pc;
          ctx.shadowColor = pc;
          ctx.shadowBlur = 10;
          ctx.fill();
          ctx.shadowBlur = 0;
        } else if (i < step) {
          ctx.fillStyle = pc;
          ctx.globalAlpha = 0.45;
          ctx.fill();
          ctx.globalAlpha = 1;
        } else {
          ctx.fillStyle = isDark ? '#152030' : '#D8E2EC';
          ctx.fill();
        }
      }
    }

    /* ================================================================
       Step description bar at bottom
       ================================================================ */
    function countWrapLines(text, maxW) {
      const words = text.split(' ');
      let line = '';
      let count = 1;
      for (let i = 0; i < words.length; i++) {
        const test = line + words[i] + ' ';
        if (ctx.measureText(test).width > maxW && line !== '') {
          count++;
          line = words[i] + ' ';
        } else {
          line = test;
        }
      }
      return count;
    }

    /* Source chip click targets (populated each frame by drawDescBar) */
    let sourceChipRects = [];

    function drawDescBar() {
      const s = STEPS[step];
      const barX = NODE_AX;
      const barY = NODE_Y + NODE_H + 12;
      const barW = CW - 2 * NODE_AX;
      const links = s.links || [];

      /* Pre-calculate layout to determine dynamic bar height */
      const phaseColors = { enrollment: C.nsBorderGreen, cert: C.orange, data: C.blue };
      const phaseLabels = { enrollment: 'ENROLLMENT', cert: 'CERTIFICATE', data: 'DATA PATH' };
      const pc = phaseColors[s.phase];
      const pl = phaseLabels[s.phase];

      const bx = barX + 14;
      ctx.font = 'bold 10px "Segoe UI", system-ui, sans-serif';
      const bw = ctx.measureText(pl).width + 14;
      const tx = bx + bw + 14;

      ctx.font = '12px "Segoe UI", system-ui, sans-serif';
      const maxW = barW - (tx - barX) - 14;
      const descLines = countWrapLines(s.desc, maxW);
      const descBottom = 28 + descLines * 15;

      /* Pre-calculate chip rows */
      const CHIP_H = 18, CHIP_GAP = 5, CHIP_ROW_H = CHIP_H + 4;
      let chipRows = 0;
      if (links.length > 0) {
        chipRows = 1;
        let cx = 0;
        for (const link of links) {
          ctx.font = '9px "Segoe UI", system-ui, sans-serif';
          const rw = ctx.measureText(link.repo.split('/')[1]).width + 10;
          ctx.font = '10px "Segoe UI", system-ui, sans-serif';
          const lw = ctx.measureText(link.label).width + 8;
          const cw = rw + lw + 6;
          if (cx + cw > maxW && cx > 0) { chipRows++; cx = 0; }
          cx += cw + CHIP_GAP;
        }
      }

      const chipSection = links.length > 0 ? 10 + chipRows * CHIP_ROW_H + 4 : 0;
      const barH = Math.max(62, descBottom + chipSection + 10);

      /* Bar background */
      roundRect(barX, barY, barW, barH, 8);
      ctx.fillStyle = isDark ? '#070E18' : '#F0F4F8';
      ctx.fill();
      ctx.strokeStyle = C.border;
      ctx.lineWidth = 1;
      ctx.stroke();

      /* Phase badge */
      const by = barY + 10;
      ctx.font = 'bold 10px "Segoe UI", system-ui, sans-serif';
      roundRect(bx, by, bw, 18, 4);
      ctx.fillStyle = pc;
      ctx.globalAlpha = 0.18;
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.strokeStyle = pc;
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = pc;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(pl, bx + 7, by + 9);

      /* Step title */
      ctx.font = 'bold 13px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = C.bright;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText('Step ' + s.n + ': ' + s.title, tx, barY + 8);

      /* Description */
      ctx.font = '12px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = C.text;
      wrapText(s.desc, tx, barY + 28, maxW, 15);

      /* Source code reference chips */
      sourceChipRects = [];
      if (links.length > 0) {
        const chipStartY = barY + descBottom + 10;

        /* Thin separator */
        ctx.save();
        ctx.globalAlpha = 0.25;
        ctx.strokeStyle = C.border;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(tx, chipStartY - 4);
        ctx.lineTo(barX + barW - 14, chipStartY - 4);
        ctx.stroke();
        ctx.restore();

        let curX = tx, curY = chipStartY;

        for (const link of links) {
          ctx.font = '9px "Segoe UI", system-ui, sans-serif';
          const repoShort = link.repo.split('/')[1];
          const rw = ctx.measureText(repoShort).width + 10;
          ctx.font = '10px "Segoe UI", system-ui, sans-serif';
          const lw = ctx.measureText(link.label).width + 8;
          const cw = rw + lw + 6;

          /* Wrap */
          if (curX + cw > barX + barW - 14 && curX > tx) {
            curX = tx;
            curY += CHIP_ROW_H;
          }

          /* Chip background */
          roundRect(curX, curY, cw, CHIP_H, 9);
          ctx.fillStyle = isDark ? '#152030' : '#E8F0FE';
          ctx.fill();
          ctx.strokeStyle = C.border;
          ctx.lineWidth = 0.5;
          ctx.stroke();

          /* Repo badge */
          roundRect(curX + 3, curY + 3, rw, CHIP_H - 6, 6);
          ctx.fillStyle = isDark ? '#0B1622' : '#D8E2EC';
          ctx.fill();
          ctx.font = '9px "Segoe UI", system-ui, sans-serif';
          ctx.fillStyle = C.dim;
          ctx.textAlign = 'left';
          ctx.textBaseline = 'middle';
          ctx.fillText(repoShort, curX + 7, curY + CHIP_H / 2);

          /* Label */
          ctx.font = '10px "Segoe UI", system-ui, sans-serif';
          ctx.fillStyle = C.blue;
          ctx.fillText(link.label, curX + rw + 4, curY + CHIP_H / 2);

          /* Store for click detection */
          sourceChipRects.push({ x: curX, y: curY, w: cw, h: CHIP_H, url: link.url });

          curX += cw + CHIP_GAP;
        }
      }
    }

    function wrapText(text, x, y, maxW, lineH) {
      const words = text.split(' ');
      let line = '';
      let ly = y;
      for (let i = 0; i < words.length; i++) {
        const test = line + words[i] + ' ';
        if (ctx.measureText(test).width > maxW && line !== '') {
          ctx.fillText(line.trim(), x, ly);
          line = words[i] + ' ';
          ly += lineH;
        } else {
          line = test;
        }
      }
      if (line.trim()) ctx.fillText(line.trim(), x, ly);
    }

    /* ================================================================
       Special effects
       ================================================================ */
    function drawEffects(ts, fxOverride) {
      const fxSet = fxOverride || new Set(STEPS[step].fx);
      const cycle = (ts % 2000) / 2000;
      const pulse = 0.5 + 0.5 * Math.sin(ts / 300);

      /* 1. Namespace enrollment flash */
      if (fxSet.has('nsEnroll')) {
        const p2 = 0.4 + 0.3 * Math.sin(ts / 400);
        ctx.save();
        ctx.globalAlpha = p2;
        ctx.font = 'bold 11px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = C.green;
        ctx.textAlign = 'right';
        ctx.textBaseline = 'top';
        ctx.fillText('io.cilium/mtls-enabled: "true"', nsRectA.x + nsRectA.w - 8, nsRectA.y + 5);
        ctx.fillText('io.cilium/mtls-enabled: "true"', nsRectB.x + nsRectB.w - 8, nsRectB.y + 5);
        ctx.restore();
      }

      /* 6. SPIRE attestation annotation */
      if (fxSet.has('spireAttest')) {
        ctx.save();
        ctx.globalAlpha = 0.7 + 0.3 * Math.sin(ts / 350);
        ctx.font = '10px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = C.orange;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        const saR = getRect('spireAgentA');
        ctx.fillText('k8s WorkloadAttestor: /proc/<pid>/cgroup', saR.x + saR.w / 2, saR.y - 6);
        ctx.restore();
      }

      /* 7. Cert ready */
      if (fxSet.has('certReady')) {
        ctx.save();
        ctx.globalAlpha = pulse;
        ctx.font = 'bold 13px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = C.green;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        const ztR = getRect('ztA');
        ctx.fillText('\u2713 Ready for mTLS', ztR.x + ztR.w / 2, ztR.y - 6);
        ctx.restore();
      }

      /* 8. Packet at pod */
      if (fxSet.has('packetAtPod')) {
        const r = getRect('podA');
        const pr = 5 + 3 * Math.sin(ts / 250);
        drawDot(r.x + r.w / 2, r.y + r.h / 2, C.blue, pr);
        ctx.save();
        ctx.font = '10px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = C.blue;
        ctx.globalAlpha = 0.8;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText('HTTP request (plaintext)', r.x + r.w / 2, r.y + r.h + 4);
        ctx.restore();
      }

      /* 9. Packet pod -> ztunnel */
      if (fxSet.has('packetPodToZt')) {
        const fr = getRect('podA');
        const tr = getRect('ztA');
        const sx = fr.x + fr.w / 2;
        const sy = fr.y + fr.h;
        const ex = tr.x + tr.w / 2;
        const ey = tr.y;
        const dx = sx + (ex - sx) * cycle;
        const dy = sy + (ey - sy) * cycle;
        drawDot(dx, dy, C.blue, 6);
      }

      /* 10. Lookup pulse */
      if (fxSet.has('lookupPulse')) {
        const ztR = getRect('ztA');
        ctx.save();
        ctx.globalAlpha = 0.3 + 0.4 * Math.sin(ts / 250);
        roundRect(ztR.x - 5, ztR.y - 5, ztR.w + 10, ztR.h + 10, 9);
        ctx.strokeStyle = C.blue;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.restore();

        ctx.save();
        ctx.font = '11px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = C.blue;
        ctx.globalAlpha = 0.85;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('SO_ORIGINAL_DST -> ' + IPs.serverPod + ':80', ztR.x + ztR.w / 2, ztR.y - 8);
        ctx.restore();
      }

      /* 11. TLS handshake animation */
      if (fxSet.has('tlsHandshake')) {
        const fromX = LA.zt.x + LA.zt.w + 2;
        const toX = LB.zt.x - 2;
        const y = LA.zt.y + LA.zt.h / 2;
        const msgs = ['ClientHello', 'ServerHello + Cert', 'Finished'];
        const phase3 = (ts % 4200) / 4200;
        const msgIdx = Math.min(Math.floor(phase3 * 3), 2);
        const msgProgress = (phase3 * 3) % 1;

        for (let i = 0; i <= msgIdx; i++) {
          const p = (i === msgIdx) ? msgProgress : 1;
          const goRight = (i % 2 === 0);
          const fx = goRight ? fromX : toX;
          const ex = goRight ? toX : fromX;
          const yOff = (i - 1) * 16;
          const dx = fx + (ex - fx) * p;
          const dy = y + yOff;

          ctx.save();
          ctx.strokeStyle = C.gold;
          ctx.lineWidth = 1.5;
          ctx.globalAlpha = 0.55;
          ctx.setLineDash([4, 3]);
          ctx.beginPath();
          ctx.moveTo(fx, y + yOff);
          ctx.lineTo(dx, dy);
          ctx.stroke();
          ctx.setLineDash([]);

          if (i === msgIdx) {
            drawDot(dx, dy, C.gold, 5);
          }

          ctx.globalAlpha = (i <= msgIdx) ? 0.85 : 0.25;
          ctx.font = 'bold 11px "Segoe UI", system-ui, sans-serif';
          ctx.fillStyle = C.gold;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          const lx = (fromX + toX) / 2;
          ctx.fillText(msgs[i], lx, y + yOff - 10);
          ctx.restore();
        }
      }

      /* 12. HBONE tunnel formation pulse */
      if (fxSet.has('hboneTunnel')) {
        const fromX = LA.pod.x + LA.pod.w + 2;
        const toX = LB.pod.x - 2;
        const y = LA.pod.y + LA.pod.h / 2;
        ctx.save();
        ctx.globalAlpha = 0.5 + 0.5 * Math.sin(ts / 400);
        ctx.font = 'bold 11px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = C.green;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText('Tunnel Active', (fromX + toX) / 2, y + 16);
        ctx.restore();
      }

      /* 15. Decrypt + verify at ztunnel B */
      if (fxSet.has('decryptVerify')) {
        const ztR = getRect('ztB');
        const cx = ztR.x + ztR.w / 2;
        const cy = ztR.y + ztR.h / 2;

        /* Green dot arriving, blue dot emerging */
        drawDot(cx - 22, cy, C.green, 5 + 3 * pulse);
        drawDot(cx + 22, cy, C.blue, 5 + 3 * (1 - pulse));

        /* Arrow */
        ctx.save();
        ctx.strokeStyle = C.text;
        ctx.lineWidth = 1.5;
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.moveTo(cx - 12, cy);
        ctx.lineTo(cx + 12, cy);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx + 12, cy);
        ctx.lineTo(cx + 6, cy - 4);
        ctx.lineTo(cx + 6, cy + 4);
        ctx.closePath();
        ctx.fillStyle = C.text;
        ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.font = '11px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = C.green;
        ctx.globalAlpha = 0.85;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('SPIFFE identity verified', cx, ztR.y - 6);
        ctx.font = '9px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = C.text;
        ctx.fillText('spiffe://cluster.local/ns/frontend/sa/web-client', cx, ztR.y + ztR.h + 14);
        ctx.restore();
      }

      /* 16. Blue dot from ztunnel B to server pod */
      if (fxSet.has('deliverToServer')) {
        const fr = getRect('ztB');
        const tr = getRect('podB');
        const sx = fr.x + fr.w / 2;
        const sy = fr.y;
        const ex = tr.x + tr.w / 2;
        const ey = tr.y + tr.h;
        const dx = sx + (ex - sx) * cycle;
        const dy = sy + (ey - sy) * cycle;
        drawDot(dx, dy, C.blue, 6);
      }

      /* 24. Summary — enrolled vs unenrolled traffic lines */
      if (fxSet.has('summary')) {
        const podAR = getRect('podA');
        const podBR = getRect('podB');
        const monR = getRect('monitoringPod');
        const podACx = podAR.x + podAR.w / 2;
        const podACy = podAR.y + podAR.h / 2;
        const podBCx = podBR.x + podBR.w / 2;
        const podBCy = podBR.y + podBR.h / 2;
        const monCx = monR.x + monR.w / 2;
        const monCy = monR.y + monR.h / 2;
        const pulseSummary = 0.6 + 0.4 * Math.sin(ts / 500);

        ctx.save();

        /* Green solid line: podA <-> podB (mTLS) */
        ctx.globalAlpha = pulseSummary;
        ctx.strokeStyle = C.green;
        ctx.lineWidth = 3;
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.moveTo(podAR.x + podAR.w + 4, podACy);
        ctx.lineTo(podBR.x - 4, podBCy);
        ctx.stroke();
        /* mTLS label */
        ctx.font = 'bold 13px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = C.green;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('mTLS', (podAR.x + podAR.w + podBR.x) / 2, podACy - 14);

        /* Blue dashed line: podA -> monitoringPod (plaintext) */
        ctx.globalAlpha = pulseSummary * 0.85;
        ctx.strokeStyle = C.blue;
        ctx.lineWidth = 2.5;
        ctx.setLineDash([8, 5]);
        ctx.beginPath();
        ctx.moveTo(podAR.x + podAR.w + 4, podACy + 8);
        ctx.lineTo(monR.x - 4, monCy);
        ctx.stroke();
        /* Label */
        ctx.font = 'bold 11px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = C.blue;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        const midAMx = (podAR.x + podAR.w + monR.x) / 2;
        const midAMy = (podACy + 8 + monCy) / 2;
        ctx.fillText('Plaintext', midAMx, midAMy - 6);

        /* Blue dashed line: monitoringPod -> podB (plaintext :15006) */
        ctx.beginPath();
        ctx.moveTo(monR.x + monR.w / 2, monR.y - 4);
        ctx.lineTo(podBR.x + podBR.w / 2, podBR.y + podBR.h + 4);
        ctx.stroke();
        /* Label */
        const midMBx = (monCx + podBCx) / 2;
        const midMBy = (monR.y - 4 + podBR.y + podBR.h + 4) / 2;
        ctx.fillText('Plaintext :15006', midMBx, midMBy - 6);

        ctx.setLineDash([]);
        ctx.restore();
      }
    }

    /* ================================================================
       Main render loop
       ================================================================ */
    function draw(ts) {
      ts = ts || 0;

      /* Clear canvas */
      ctx.fillStyle = C.bg;
      ctx.fillRect(0, 0, CW, CH);

      const s = overviewMode ? STEPS[STEPS.length - 1] : STEPS[step];
      const activeSet = overviewMode ? new Set() : new Set(s.active);
      const overviewFx = ['hboneTunnel', 'encryptedEgress', 'crossWire', 'encryptedIngress', 'deliverToServer'];
      const fxSet = overviewMode ? new Set(overviewFx) : new Set(s.fx);

      /* Determine which components are dimmed */
      function isDim(id) {
        if (overviewMode) return false; /* Everything visible in overview */
        if (activeSet.size === 0) return false;
        return !activeSet.has(id);
      }

      /* Determine if namespace should glow */
      const nsGlow = overviewMode || fxSet.has('nsEnroll');

      /* ---- Draw Node A ---- */
      function drawNode(lay, nx, nodeLabel, nodeIP, isA) {
        /* Node background — starts at NODE_Y + NODE_HEADER to leave room for title */
        const nodeBoxY = NODE_Y + NODE_HEADER;
        roundRect(nx, nodeBoxY, NODE_W, NODE_H - NODE_HEADER, 10);
        ctx.fillStyle = C.bg;
        ctx.fill();
        ctx.strokeStyle = C.border;
        ctx.lineWidth = 1;
        ctx.stroke();

        /* Node title — above the first zone, inside node box header area */
        ctx.font = 'bold 15px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = C.bright;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText(nodeLabel, nx + 14, nodeBoxY + 6);
        const nodeLabelW = ctx.measureText(nodeLabel).width;

        /* Node IP */
        ctx.font = '12px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = C.text;
        ctx.fillText(nodeIP, nx + 14 + nodeLabelW + 10, nodeBoxY + 8);

        /* Namespace zone */
        const nsR = isA ? nsRectA : nsRectB;
        drawZone(nsR.x, nsR.y, nsR.w, nsR.h,
          nsGlow ? (isDark ? '#0A2A30' : '#A8E8D4') : C.nsGreen,
          nsGlow ? C.green : C.nsBorderGreen,
          nsGlow ? (isA ? 'ns: frontend (enrolled)' : 'ns: backend (enrolled)') : (isA ? 'ns: frontend' : 'ns: backend'),
          { glow: nsGlow });

        /* Data plane zone */
        drawZone(nx + 10, lay.dpY, NODE_W - 20, lay.dpH,
          C.dpFill, C.dpBorder, 'Data Plane', {});

        /* Control plane zone */
        drawZone(nx + 10, lay.cpY, NODE_W - 20, lay.cpH,
          C.cpFill, C.cpBorder, 'Control Plane', {});

        /* Pod */
        const podId = isA ? 'podA' : 'podB';
        drawComp(podId, {
          dim: isDim(podId),
          glow: activeSet.has(podId),
          borderColor: C.nsBorderGreen,
        });

        /* ztunnel */
        const ztId = isA ? 'ztA' : 'ztB';
        /* ztunnel A gets cert cached at step 11 (index 10), ztunnel B at step 13 (index 12) */
        const hasCert = isA ? step >= 10 : step >= 12;
        drawComp(ztId, {
          dim: isDim(ztId),
          glow: activeSet.has(ztId),
          borderColor: C.dpBorder,
          badge: hasCert ? { text: '\u2713', color: C.green } : null,
        });

        /* Cilium Agent */
        const caId = isA ? 'ciliumAgentA' : 'ciliumAgentB';
        drawComp(caId, {
          dim: isDim(caId),
          glow: activeSet.has(caId),
          borderColor: C.cpBorder,
        });

        /* Cilium Operator (only on Node A) */
        if (isA) {
          drawComp('ciliumOpA', {
            dim: isDim('ciliumOpA'),
            glow: activeSet.has('ciliumOpA'),
            borderColor: C.cpBorder,
          });
        } else {
          /* Empty dashed placeholder */
          const r = lay.ciliumOp;
          ctx.save();
          ctx.globalAlpha = 0.15;
          roundRect(r.x, r.y, r.w, r.h, 7);
          ctx.strokeStyle = C.border;
          ctx.lineWidth = 1;
          ctx.setLineDash([5, 4]);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.restore();
        }

        /* SPIRE Agent */
        const saId = isA ? 'spireAgentA' : 'spireAgentB';
        drawComp(saId, {
          dim: isDim(saId),
          glow: activeSet.has(saId),
          borderColor: C.cpBorder,
        });

        /* SPIRE Server (cluster-wide, only on Node A) */
        if (isA) {
          drawComp('spireServerA', {
            dim: isDim('spireServerA'),
            glow: activeSet.has('spireServerA'),
            borderColor: C.cpBorder,
          });
        } else {
          /* Empty dashed placeholder */
          const r = lay.spireServer;
          ctx.save();
          ctx.globalAlpha = 0.15;
          roundRect(r.x, r.y, r.w, r.h, 7);
          ctx.strokeStyle = C.border;
          ctx.lineWidth = 1;
          ctx.setLineDash([5, 4]);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.restore();
        }

        /* containerd */
        const cdId = isA ? 'containerdA' : 'containerdB';
        drawComp(cdId, {
          dim: isDim(cdId),
          glow: activeSet.has(cdId),
          borderColor: C.cpBorder,
        });

        /* lxc veth (host-side veth pair) — green border ties it to pod namespace */
        const lxcId = isA ? 'lxcA' : 'lxcB';
        drawComp(lxcId, {
          dim: isDim(lxcId),
          glow: activeSet.has(lxcId),
          borderColor: C.nsBorderGreen,
        });

        /* Veth pair connector: pod ↔ lxc (crosses namespace boundary) */
        {
          const podR = COMP[podId].r;
          const lxcR = COMP[lxcId].r;
          const nsR = isA ? nsRectA : nsRectB;
          const vethX = podR.x + podR.w / 2;
          const vethTop = podR.y + podR.h;       /* pod bottom edge */
          const vethBot = lxcR.y;                 /* lxc top edge */
          const nsBorderY = nsR.y + nsR.h;        /* namespace zone bottom */
          const vethDim = isDim(podId) && isDim(lxcId);

          ctx.save();
          ctx.globalAlpha = vethDim ? C.dimAlpha : 0.55;

          /* Dashed connector line */
          ctx.strokeStyle = C.nsBorderGreen;
          ctx.lineWidth = 1.5;
          ctx.setLineDash([4, 3]);
          ctx.beginPath();
          ctx.moveTo(vethX, vethTop);
          ctx.lineTo(vethX, vethBot);
          ctx.stroke();
          ctx.setLineDash([]);

          /* Endpoint dots (plug icons) */
          ctx.fillStyle = C.nsBorderGreen;
          ctx.beginPath();
          ctx.arc(vethX, vethTop, 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(vethX, vethBot, 3, 0, Math.PI * 2);
          ctx.fill();

          /* NS boundary crossing indicator — small horizontal tick */
          ctx.globalAlpha = vethDim ? C.dimAlpha : 0.35;
          ctx.strokeStyle = C.nsBorderGreen;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(vethX - 10, nsBorderY);
          ctx.lineTo(vethX + 10, nsBorderY);
          ctx.stroke();

          /* "veth" label */
          ctx.globalAlpha = vethDim ? C.dimAlpha : 0.55;
          ctx.font = '9px "Segoe UI", system-ui, sans-serif';
          ctx.fillStyle = C.nsBorderGreen;
          ctx.textAlign = 'left';
          ctx.textBaseline = 'middle';
          ctx.fillText('veth', vethX + 6, (vethTop + vethBot) / 2);

          ctx.restore();
        }

        /* NIC (eth0) */
        const nicId = isA ? 'nicA' : 'nicB';
        drawComp(nicId, {
          dim: isDim(nicId),
          glow: activeSet.has(nicId),
          borderColor: C.cpBorder,
        });

        /* Unenrolled namespace zone (Node B only) */
        if (!isA) {
          const ueY = lay.unenrolledY;
          const ueH = lay.unenrolledH;
          const ueFill = isDark ? '#181E28' : '#F0F0F0';
          const ueBorder = isDark ? '#5A6070' : '#9A9A9A';
          drawZone(nx + 10, ueY, NODE_W - 20, ueH,
            ueFill, ueBorder,
            'ns: monitoring (not enrolled)',
            { dashed: true });
          drawComp('monitoringPod', {
            dim: isDim('monitoringPod'),
            glow: activeSet.has('monitoringPod'),
            borderColor: ueBorder,
          });
        }
      }

      drawNode(LA, NODE_AX, 'Node A', IPs.nodeA, true);
      drawNode(LB, NODE_BX, 'Node B', IPs.nodeB, false);

      /* Cross-node connections */
      drawHBONELine(ts, fxSet);
      drawWireLine(ts, fxSet);

      /* Step indicator dots */
      drawStepDots();

      /* Arrows */
      if (overviewMode) {
        /* Draw arrows from steps 16-21 (data path overview) */
        const seen = new Set();
        for (let i = 15; i <= 20 && i < STEPS.length; i++) {
          for (const arr of STEPS[i].arrows) {
            const key = arr.from + '>' + arr.to + '>' + arr.color;
            if (seen.has(key)) continue;
            seen.add(key);
            const color = C[arr.color] || arr.color;
            drawArrow(arr.from, arr.to, color, arr.label, { offY: arr.offY || 0, offX: arr.offX || 0, labelOffY: arr.labelOffY || 0 }, ts);
          }
        }
      } else {
        for (const arr of s.arrows) {
          const color = C[arr.color] || arr.color;
          drawArrow(arr.from, arr.to, color, arr.label, { offY: arr.offY || 0, offX: arr.offX || 0, labelOffY: arr.labelOffY || 0 }, ts);
        }
      }

      /* Special effects */
      drawEffects(ts, fxSet);

      /* Description bar */
      drawDescBar();

      requestAnimationFrame(draw);
    }

    /* ================================================================
       Controls
       ================================================================ */
    const btnBack = document.getElementById('btnBack');
    const btnForward = document.getElementById('btnForward');
    const btnReset = document.getElementById('btnReset');
    const btnAuto = document.getElementById('btnAuto');
    const stepCounter = document.getElementById('stepCounter');

    function goToStep(n) {
      step = Math.max(0, Math.min(STEPS.length - 1, n));
      if (overviewMode) {
        overviewMode = false;
        btnOverview.classList.remove('active');
        btnOverview.textContent = '\u25C9 Overview';
      }
      updateUI();
    }

    function updateUI() {
      stepCounter.textContent = overviewMode ? 'Overview' : 'Step ' + (step + 1) + ' / ' + STEPS.length;
      btnBack.disabled = step === 0;
      btnForward.disabled = step === STEPS.length - 1;
      btnAuto.classList.toggle('active', autoPlay);
      btnAuto.innerHTML = autoPlay ? '\u23F8 Pause' : '\u25B6 Auto-play';
    }

    btnBack.addEventListener('click', () => goToStep(step - 1));
    btnForward.addEventListener('click', () => goToStep(step + 1));
    btnReset.addEventListener('click', () => { stopAuto(); goToStep(0); });
    btnAuto.addEventListener('click', toggleAuto);

    /* Overview — toggle all-flows view */
    const btnOverview = document.getElementById('btnOverview');
    btnOverview.addEventListener('click', () => {
      overviewMode = !overviewMode;
      stopAuto();
      btnOverview.classList.toggle('active', overviewMode);
      btnOverview.textContent = overviewMode ? '\u25C9 Overview ON' : '\u25C9 Overview';
      updateUI();
    });

    /* Export GIF — capture each step as a frame */
    document.getElementById('btnGif').addEventListener('click', async () => {
      const btn = document.getElementById('btnGif');
      try {
        btn.disabled = true;
        btn.textContent = 'Capturing...';
        stopAuto();

      /* Dynamically load gif.js from CDN */
      if (typeof GIF === 'undefined') {
        await new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js';
          s.onload = resolve;
          s.onerror = reject;
          document.head.appendChild(s);
        });
      }

      const gif = new GIF({
        workers: 2,
        quality: 10,
        width: canvas.width,
        height: canvas.height,
        workerScript: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js',
      });

      /* Capture each step */
      const savedStep = step;
      for (let i = 0; i < STEPS.length; i++) {
        step = i;
        draw(performance.now());
        /* Add frame — hold longer on first, last, and summary steps */
        const delay = (i === 0 || i === STEPS.length - 1) ? 4000 : 2500;
        gif.addFrame(ctx, { copy: true, delay: delay });
        btn.textContent = 'Frame ' + (i + 1) + '/' + STEPS.length;
      }
      step = savedStep;
      updateUI();

      gif.on('finished', (blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'transparent-mtls-animation.gif';
        a.click();
        URL.revokeObjectURL(url);
        btn.disabled = false;
        btn.textContent = '\uD83D\uDCF7 Export GIF';
      });

      gif.on('progress', (p) => {
        btn.textContent = 'Encoding ' + Math.round(p * 100) + '%';
      });

      btn.textContent = 'Encoding...';
      gif.render();
      } catch (err) {
        btn.disabled = false;
        btn.textContent = '\uD83D\uDCF7 Export GIF';
        alert('GIF export failed: ' + err.message);
      }
    });

    function toggleAuto() {
      autoPlay = !autoPlay;
      if (autoPlay) startAuto();
      else stopAuto();
      updateUI();
    }

    function startAuto() {
      stopAuto();
      autoPlay = true;
      const interval = 3000 / speed;
      autoTimer = setInterval(() => {
        if (step < STEPS.length - 1) {
          goToStep(step + 1);
        } else {
          stopAuto();
          updateUI();
        }
      }, interval);
    }

    function stopAuto() {
      autoPlay = false;
      if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
    }

    /* Speed buttons */
    document.querySelectorAll('.speed-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        speed = parseInt(btn.dataset.speed);
        document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (autoPlay) { startAuto(); updateUI(); }
      });
    });

    /* Keyboard: arrows, space */
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') { goToStep(step - 1); e.preventDefault(); }
      if (e.key === 'ArrowRight') { goToStep(step + 1); e.preventDefault(); }
      if (e.key === ' ') { toggleAuto(); e.preventDefault(); }
    });

    /* Source chip click + hover on canvas */
    function canvasToLogical(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) * (CW / rect.width),
        y: (e.clientY - rect.top) * (CH / rect.height),
      };
    }

    canvas.addEventListener('click', (e) => {
      const p = canvasToLogical(e);
      for (const chip of sourceChipRects) {
        if (p.x >= chip.x && p.x <= chip.x + chip.w && p.y >= chip.y && p.y <= chip.y + chip.h) {
          window.open(chip.url, '_blank', 'noopener');
          return;
        }
      }
    });

    canvas.addEventListener('mousemove', (e) => {
      const p = canvasToLogical(e);
      let over = false;
      for (const chip of sourceChipRects) {
        if (p.x >= chip.x && p.x <= chip.x + chip.w && p.y >= chip.y && p.y <= chip.y + chip.h) {
          over = true;
          break;
        }
      }
      canvas.style.cursor = over ? 'pointer' : 'default';
    });

    /* ================================================================
       Init
       ================================================================ */
    loadLogos(); /* async — logos pop in as they load, emojis show until then */
    updateUI();
    requestAnimationFrame(draw);
  </script>
</body>

</html>
